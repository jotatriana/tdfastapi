      parameters:
      - name: filter
        in: query
        description: |-
          Allows filtering by using comparison and logical operators. <br/><br/>
                <li>To search parts of a string within a field of type string then the <b>contains</b> operator should be used.<br/>
                The syntax is the following: <b>contains(field, 'value')</b></li>
                <br/>
                Logical operators are <b>and</b> and <b>or</b>. <br/>
                When using multiple <b>ANDs</b> and <b>ORs</b>, you should use <b>parentheses</b> to explicitly define the logical operators evaluation order. <br/>
                (note: this is recommended because the usual precedence rules aren't supported due to an implementation detail). <br/><br/>
                <b>Examples:</b>
                <ul>
                <li>(contains(user_id, 'agent1') or contains(user_id, 'agent2')) and active eq true</li>
                <li>contains(user_id, 'agent1') </li>
                </ul>
                More information <a href='https://talkdesk.github.io/api-docs/#collections-may-support-dynamic-filters'>here</a>
        required: true
        style: form
        explode: true
        schema:
          type: string
        example: (login_timestamp ge '2020-12-18T13:09:09.417Z' and login_timestamp
