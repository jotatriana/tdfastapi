    provisioning_account_body:
      required:
      - account_name
      - admin_email
      - admin_name
      - company_name
      - currency_iso_code
      - edition
      - num_licenses
      - phone_number
      - website_url
      type: object
      properties:
        account_name:
          maxLength: 20
          minLength: 3
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9\\-]*[a-zA-Z0-9]$"
          type: string
          description: Account Name
          example: JosephPinetrees
        admin_email:
          minLength: 8
          pattern: \S
          type: string
          description: The email address of the admin for the account.
          example: joseph@josephpinetrees.com
        admin_name:
          maxLength: 250
          minLength: 3
          pattern: "^[a-zA-Z0-9\\s]*$"
          type: string
          description: The first and last name of the admin for the account.
          example: John Doe
        authentication:
          $ref: "#/components/schemas/expressprovisioningaccount_authentication"
        company_name:
          maxLength: 250
          minLength: 3
          pattern: \S
          type: string
          description: The name of the company.
          example: Joseph Pinetree
        currency_iso_code:
          maxLength: 3
          minLength: 3
          type: string
          description: The 3 chars ISO code of the currency for the account according
            to ISO-4217 (https://www.iso.org/iso-4217-currency-codes.html ).
          example: USD
          allOf:
          - type: string
            enum:
            - AUD
            - BRL
            - CAD
            - EUR
            - GBP
            - SGD
            - USD
        edition:
          minLength: 7
          type: string
          description: The Talkdesk edition.
          example: EXPRESS
          allOf:
          - type: string
            enum:
            - EXPRESS
        external_data:
          maxLength: 1024
          type: string
          description: Custom data in string format to be stored along with the new
            account information.
          example: salesforce_id:2142141
        num_licenses:
          maximum: 50
          minimum: 1
          description: The number of TD licenses that will be available for the account.
          format: int32
          example: 10
        phone_number:
          maxLength: 15
          minLength: 7
          pattern: "^[\\+]?[(]?[0-9]{3}[)]?[-\\s\\.]?[0-9]{3}[-\\s\\.]?[0-9]{4,6}$"
          type: string
          description: "The company’s phone number, starting with the country code."
          example: "+351489489948"
        website_url:
          minLength: 6
          pattern: \S
          type: string
          description: The URL of the company’s website or social presence.
          example: https://www.josephpinetrees.com
