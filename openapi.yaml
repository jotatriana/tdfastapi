                  description: The List of the location opening hours for the next
                    7 days order by date.
                  items:
                    allOf:
                    - required:
                      - date
                      - id
                      type: object
                      properties:
                        id:
                          minLength: 1
                          type: integer
                          description: The value of the day of week for a special
                            date
                          example: 1
                        date:
                          minLength: 1
                          type: string
                          description: The ISO-formatted date to which the open hours
                            refer to.
                          format: date
                          example: 2023-05-01
                        special_date_name:
                          minLength: 1
                          type: string
                          description: "Name of the special date, if it is defined."
                          example: International Workers' Day
                      description: Represents the opening hours of a given date.
                    - required:
                      - day_of_week
                      - slots
                      type: object
                      properties:
                        day_of_week:
                          minLength: 1
                          type: string
                          description: The day of the week to which the open hours
                            refer to
                          example: TUESDAY
                          enum:
                          - MONDAY
                          - TUESDAY
                          - WEDNESDAY
                          - THURSDAY
                          - FRIDAY
                          - SATURDAY
                          - SUNDAY
                        slots:
                          type: array
                          items:
                            required:
                            - close_at
                            - open_at
                            type: object
                            properties:
                              open_at:
                                minLength: 1
                                pattern: ^\d\d\:\d\d\:\d\d$
                                type: string
                                description: "The hour at which the location opens,\
                                  \ in the location's time zone. Formatted according\
                                  \ to the ISO-8601 standard."
                                example: 09:00:00
                              close_at:
                                minLength: 1
                                pattern: ^\d\d\:\d\d\:\d\d$
                                type: string
                                description: "The hour at which the location closes,\
                                  \ in the location's time zone. Formatted according\
                                  \ to the ISO-8601 standard."
                                example: 18:00:00
                specialities:
                  type: array
                  items:
                    type: string
                    example: IT support
                service_names:
                  type: array
                  items:
                    type: string
                    example: ServiceName
            - required:
              - address
              - name
              - time_zone
              type: object
              properties:
                name:
                  minLength: 1
                  type: string
                  description: The name of the location
                  example: Store Avenida da Liberdade
                alternative_names:
                  type: array
                  description: The alternative names of the location
                  example:
                  - Liberdade Store
                  - Lisboa Flagship
                  items:
                    maxLength: 9999
                    minLength: 1
                    type: string
                    description: "The alternative name (e.g., Liberdade Store, Lisboa\
                      \ Flagship)"
                    example: Liberdade Store
                external_id:
                  minLength: 1
                  type: string
                  description: The external id of the location
                  example: "123"
                type:
                  minLength: 1
                  type: string
                  description: The type of the location
                  example: Store
                time_zone:
                  minLength: 1
                  type: string
                  description: "The time zone of the location, according to IANA."
                  example: Europe/Lisbon
                phone_numbers:
                  type: array
                  items:
                    required:
                    - phone_number
                    type: object
                    properties:
                      phone_number:
                        minLength: 1
                        type: string
                        description: The phone number of one person.
                        example: "+351123456789"
                      name:
                        minLength: 1
                        type: string
                        description: The phone number name
                        example: Home
                    description: Represents the phone numbers of a location
                image_url:
                  minLength: 1
                  type: string
                  description: The URL of an image of the location
                  example: https://my-image-cdn.com/path/to/my/store/image.png
                address:
                  required:
                  - address
                  - country_name
                  - zip_code
                  type: object
                  properties:
                    address:
                      minLength: 1
                      type: string
                      description: "The address line of the location. Typically the\
                        \ street, number, etc."
                      example: Lisbon
                    zip_code:
                      minLength: 1
                      type: string
                      description: The zip-code of the location
                      example: "20000000"
                    city:
                      minLength: 1
                      type: string
                      description: The city of the location
                      example: Lisbon
                    region_name:
                      minLength: 1
                      type: string
                      description: The region name (country subdivision)
                      example: Lisbon
                    country_name:
                      minLength: 1
                      type: string
                      description: The country name
                      example: Portugal
                    coordinates:
                      required:
                      - latitude
                      - longitude
                      type: object
                      properties:
                        latitude:
                          maximum: 90
                          minimum: -90
                          type: number
                          format: double
                          example: 38.736946
                        longitude:
                          maximum: 180
                          minimum: -180
                          type: number
                          format: double
                          example: -9.142685
                  description: Represents the address of a location
                opening_status:
                  minLength: 1
                  type: string
                  description: "The status of the location, if it is opened or closed"
                  example: OPEN
                  enum:
                  - OPEN
                  - CLOSED
                services:
                  type: array
                  description: The list of services
                  items:
                    required:
                    - id
                    - name
                    type: object
                    properties:
                      id:
                        maxLength: 9999
                        minLength: 1
                        type: string
                        description: The id of service
                        example: d06b0425-c9eb-d8a3-a7c0-ce14d96a651f
                      name:
                        maxLength: 9999
                        minLength: 1
                        type: string
                        description: The name of service
                        example: name
      example:
        locations:
        - ""
        - ""
