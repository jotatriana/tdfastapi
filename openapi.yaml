      description: |
        Update the Talkdesk contact information fields with the information of the FSI member.
        To get the Talkdesk contact it is required to provided one of the query parameters: contact_id or phone_number.
        When is provided the contact_id the Talkdesk contact to update will be found by the contact_id.
        When is provided the phone_number the Talkdesk contact to update will be found if only one match of the **phone number** exists in the contact Api.
        The update process will only occur only if a Talkdesk contact is retrieved and exists one Fsi member with identifier equals to **member_id**.
