      parameters:
      - name: customer_id
        in: path
        description: The customer id.
        required: true
        style: simple
        explode: false
        schema:
          type: string
          example: customer123
      - name: limit
        in: query
        description: The amount of orders we want to get
        required: true
        style: form
        explode: true
