        is_rar_able: true
        rar_status: PENDING
        medication: medication
        is_fillable: true
        last_dispensed: 2000-01-23T04:56:07.000+00:00
        fills_remaining: 2
        pharmacy_id: pharmacy_id
        pharmacy_name: pharmacy_name
        id: id
        status: UNDEFINED
