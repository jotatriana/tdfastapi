    inline_response_200_217__embedded_orders:
      required:
      - id
      - order_number
      type: object
      properties:
        id:
          type: string
          description: The ID of the order
          example: order456
        order_number:
          type: string
          description: The number of the order (usually the order identifier that
            the customer knows)
          example: "#Y34DHR"
        customer_id:
          type: string
          description: The ID of the customer that created this order
          example: customer123
        purchase_datetime:
          type: string
          description: The timestamp date when the order was created
          format: date-time
          example: 2021-09-14T12:16:50.078Z
        delivery_type:
          description: The type of delivery associated with the order
          allOf:
          - type: string
            description: Represents the type of delivery for a given order
            example: SHIPPING
            enum:
            - UNKNOWN
            - LOCAL_DELIVERY
            - LOCAL_PICKUP
            - SHIPPING
        shipping_addresses:
          type: array
          description: The address to which the order will be/was shipped
          items:
            $ref: "#/components/schemas/inline_response_200_218_shipping_addresses"
        items_number:
          maximum: 100
          minimum: 1
          type: integer
          description: The number of order items
          format: int64
          example: 3
        price_summary:
          description: The summary of the order prices
          allOf:
          - required:
            - final_total_amount
            - original_total_amount
            type: object
            properties:
              original_total_amount:
                description: "The original total amount of the order, i.e. before\
                  \ applying discounts, shipping and taxes"
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              discounts_amount:
                description: The amount of the order discounts
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              shipping_amount:
                description: The amount of the order shipping costs
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              taxes_amount:
                description: The amount of the order taxes
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              final_total_amount:
                description: "The final total amount of the order, i.e. after applying\
                  \ discounts, shipping and taxes"
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              net_payment_amount:
                description: The net payment for the order
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              total_outstanding_amount:
                description: The total amount not yet transacted for the order
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              total_refunded_amount:
                description: The total amount that was refunded
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
        order_extra_info:
          description: The extra info of the order
          allOf:
          - type: object
            properties:
              highlighted_item_image_url:
                type: string
                description: 'The image of most expensive item '
                example: https://external-integration.url.com/payment_card_brand_icon.jpg
        status:
          type: string
          description: The status of the order. Each integration has its own set of
            possible status values
          example: CONFIRMED
        custom_fields:
          type: object
          additionalProperties: true
          description: The custom fields associated with the provider
        brand:
          type: string
          description: The brand of the provider
          example: Brand 123
      description: Describes the order resource item.
      example:
        items_number: 3
        delivery_type: ""
        custom_fields: ""
        order_number: "#Y34DHR"
        price_summary: ""
        id: order456
        customer_id: customer123
