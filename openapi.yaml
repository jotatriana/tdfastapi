  /erc/ecommerce/connections/customers/shipments/available-slots:
    get:
      tags:
      - ERC ECommerce Connections
      description: "Read the ERC e-commerce customer shipment available slots for\
        \ the provided customer id, order id or delivery id."
      operationId: ercEcommerceConnectionsCustomersShipmentsAvailable_slotsGET
      parameters:
      - name: customer_id
        in: query
        description: The unique identifier for the customer whose shipment available
          slots need to be retrieved.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
          example: customer123
      - name: order_id
        in: query
        description: The order id you want to query.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
          example: order_no_1
      - name: delivery_id
        in: query
        description: The delivery id you want to query.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          type: string
          example: delivery123
      - name: start_time
        in: query
        description: The start time for the shipment available slots query.
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
          example: 2023-08-30T10:00:00Z
      - name: end_time
        in: query
        description: The end time for the shipment available slots query.
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
          example: 2023-08-30T12:00:00Z
      - name: zip_code
        in: query
        description: The zip code for the shipment available slots query.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 10
          minLength: 5
          type: string
          example: "12345"
      - name: brand
        in: query
        description: The brand of the provider you want to query.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
          example: Brand A
      - name: limit
        in: query
        description: The amount of shipment available slots you want to get.
        required: false
        style: form
        explode: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
          example: 10
          default: 50
      - name: cursor
        in: query
        description: The opaque string that represents the cursor after which the
          'limit' amount of available slots are retrieved.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
          default: ""
        example: eyJsYXN0X2lkIjozMDExMjM4MjUsImxhc3RfdmFsdWUiOiAiMjAyMC0wOC0zMCJ9
      - name: order_by
        in: query
        description: "The parameter to be sorted for. Use order_by=key1:desc for descending,\
          \ order_by=key1:asc for ascending."
        required: false
        style: form
        explode: true
        schema:
          maxLength: 255
          minLength: 1
          type: string
          example: date:asc
      responses:
        "200":
          description: The list of customer available slots found for the provided
            customer id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_219"
              examples:
                Valid Customer Available Slot List:
                  value:
                    _embedded:
                      delivery_slots:
                      - id: slot_001
                        brand: Brand A
                        date: 2025-01-01
                        time:
                          start: 9:00 AM
                          end: 11:00 AM
                        timezone: America/New_York
                        shipping_provider: FedEx
                        custom_fields:
                          field1: Custom Value 1
                          field2: Custom Value 2
                    _links:
                      self:
                        href: http://api-docs.talkdesk.org/erc/ecommerce/connections/customers/shipments/available-slots?limit=2&order_by=date:asc
                      next:
                        href: http://api-docs.talkdesk.org/erc/ecommerce/connections/customers/shipments/available-slots?limit=2&order_by=date:asc&cursor=eyJsYXN0X2lkIjoxMjQ4MzU4NTYzODYyLCJsYXN0X3ZhbHVlIjoiMjAxOS0wNi0xNyAwMjoyMzo0Mi4wMDAwMDAifQ==
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                examples:
                  Generic Bad Request:
                    value:
                      code: "3234000"
                      message: Bad request.
                  Invalid Combined Param:
                    value:
                      code: "3234002"
                      message: At least one of the parameters should be provided.
                      fields:
                      - name: customer_id
                      - name: order_id
                      - name: delivery_id
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              examples:
