    bulk_directory_type_body:
      required:
      - file
      type: object
      properties:
        file:
          type: string
          description: |
            The file containing the rows to be upload at service directory List table.
            The file must be a text file with text/csv content format and the allowed columns are:
             * SERVICE_ID
               - identifier of the service, will generate a random one if it empty
             * SERVICE_NAME
               - The name of the service, Any given string. It can include special chars.
             * SERVICE_TYPE
               - The type of the service, Any given string. It can include special chars.
             * DURATION
               - The duration of the service. Typically the time duration, number, etc.
             * DESCRIPTION
               - The DESCRIPTION the service
             * VIRTUAL_LOCATION_URL
               - The virtual_location_url of the service
             * PRICE
               - The price of the service.
             * PHONE_NUMBER
               - The phone number of the service, format should phoneNumber1:phoneNumberName1|phoneNumber2:phoneNumberName2
             * TIMEZONE
               - The time zone of the service, according to IANA.
             * BUSINESS_MON
               - Monday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_TUE
               - Tuesday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_WED
               - Wednesday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_THU
               - Thursday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_FRI
               - Friday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_SAT
               - Saturday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * BUSINESS_SUN
               - Sunday business hours. Example: 10:00AM-01:00PM | 02:00PM-08PM
             * LOCATIONS
               - The location external ids of the service
             * SPECIAL_DATES
               - The special dates of the service in JSON format. Example: [{"name":"special date","date":"2025-03-20","repeat_rule":"DOES_NOT_REPEATS","business_hours":[{"open_at":"00:03:00","close_at":"12:58:00"}],"notes":""}]
          format: text/csv
