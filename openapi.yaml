          minimum: 0
          type: number
          description: |
            <ul>
              <li>Distance is measured in meters.</li>
              <li>If no distance is provided, the default distance configured in Industries-settings will be used.</li>
              <li>Currently, these three parameters can only be used when the Feature Flag is enabled.</li>
            </ul>
