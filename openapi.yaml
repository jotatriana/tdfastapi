              \ = currently effective; INACTIVE = not currently active (expired, terminated,\
              \ or not yet effective)."
            enum:
            - ACTIVE
            - INACTIVE
          priority:
            type: string
            description: Priority of a patient's coverage relative to other active
              plans. PRIMARY = first payer; SECONDARY = second payer; TERTIARY = third
              payer; ... up to DENARY = tenth payer.
            enum:
            - PRIMARY
            - SECONDARY
            - TERTIARY
            - QUATERNARY
            - QUINARY
            - SENARY
            - SEPTENARY
            - OCTONARY
            - NONARY
            - DENARY
        description: Base definition containing common fields for a patient's insurance
          coverage.
