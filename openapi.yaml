  /actions/users/assign-ring-groups:
    post:
      tags:
      - Ring Groups
      description: |
        Assigns multiple ring groups to multiple agents. Some relevant caveats about the operation:
        * The operation is idempotent and it returns successfully even if some users already have some of the ring
          groups (and for those cases the operation is a noop).

        * As ring groups aren't really a resource on our domain, assigning a "non-existent" ring group to an agent has the
          side-effect of "creating" the ring group (e.g. the account ring groups endpoint will start listing it).

        * The operation is non-transactional. This means that in case of an error the operation can be partially applied,
          even if a error status code is returned.
      operationId: AssignUserRingGroups
      parameters: []
      requestBody:
        description: The body of the request.
        content:
          application/hal+json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/users_assignringgroups_body"
            example:
            - user_id: dc54ca5f13994a679fbf448bf017c995
              ring_groups:
              - support-en
              - support-es
              - agents-en
              - agents-es
              - agents
            - user_id: 25f6e1db36ec4e5cbaf46eae9bfb4f08
              ring_groups:
              - support-pt
              - agents-pt
              - agents
        required: true
      responses:
        "204":
          description: The ring groups were associated
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              examples:
                General bad request:
                  value:
                    code: "0300012"
                    message: Bad request.
                Invalid ring groups:
                  value:
                    code: "0300006"
                    message: "There are ring groups with invalid names: large_ring_group,\
                      \ large_ring_group_2"
                Bulk operations limit exceed:
                  value:
                    code: "0300007"
                    message: "Bulk operations limit exceeded. Found: 101. Allowed:\
                      \ 100."
                Assigned chained ring group to user error:
                  value:
                    code: "0300009"
                    message: "Chained ring groups cannot be assigned to users: ring_group_name"
                Ring group size error:
                  value:
                    code: "0300010"
                    message: One of the agents reached the max ring groups allowed.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0300001"
                message: Access denied.
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0300002"
                message: Forbidden access.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0300003"
                message: "An error has occurred, please contact Talkdesk support."
      security:
      - Early Access:
        - user-ring-groups:write
      x-swagger-router-controller: RingGroups
