        explode: true
        schema:
          maxLength: 24
          minLength: 10
          type: string
          format: date-time
        example: 2022-01-17T11:00:00.000Z
      - name: end_date
        in: query
        description: The date until which the available slots should be considered
          as a viable option according to the client’s schedule.
