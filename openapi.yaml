                    customer_id: ba3166d1-3d01-4333-bdfa-58c238788267
                    started_at: 2020-03-30T00:00:00.000000Z
                    ended_at: 2020-03-30T00:08:00.000000Z
                    direction: OUT
                    ring_groups:
                    - billing
                    - reporting
                    messages:
                    - message_id: c9d499a2-5033-43ed-9de6-63afddee4b30
                      text: Sorry for the inconvenience sir. May I have your account
                        number please?
                      channel: VOICE
                      participant: USER
                      sentiment: POSITIVE
                      intent: Apologize
                      intent_confidence_score: 0.75
                      intent_is_fallback: true
                      start_time: 30
                      end_time: 37
                      transcription_type: POST_CALL
                      source_system: STT
                      recording_id: f883958122244cbfb8ed5606e556a694
                      recording_index: 0
                      message_index: 4
                      message_start_at: 2020-03-30T00:00:30.000000Z
                      agent_id: 4c607db0-167c-410a-a825-92d5f4162961
                    agents:
