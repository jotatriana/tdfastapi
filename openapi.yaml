  /account/wallets:
    get:
      tags:
      - Usage Manager
      description: Get account wallet list
      operationId: accountWalletsGET
      parameters:
      - name: page
        in: query
        description: Page number
        required: false
        style: form
        explode: true
        schema:
          maximum: 2147483647
          minimum: 1
          type: integer
          default: 1
      - name: per_page
        in: query
        description: Maximum number of items per page
        required: false
        style: form
        explode: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
      - name: filter
        in: query
        description: |
          Filter wallets according to the specified filter expression.

          Currently you can filter by the following attributes:
          * `name` - Filter by wallet name.  E.g. `name eq 'product_usage'`.
          * `product_name` - Filter by product name. E.g. `product_name eq 'SaaS Consumption-Licensing'`.
          Supported comparison operators:
          * `contains` - Match if any value is within the list, i.e. evaluates to true if any value of the contains operand matches the value in the database. E.g. `contains(product_name, 'standard')`.
          * `eq` - Exact match, i.e. only evaluates to true if both operands have the same value. E.g. `name eq 'saas_licenses'`.
          Supported logical operators:
          * `and` - AND logical operator. E.g. `name eq 'saas_licenses' and product_name eq 'Talkdesk Fax'`.
          * `or` - OR logical operator. E.g. `name eq 'saas_licenses' or product_name eq 'Talkdesk Fax'`.
          * `not` - NOT logical operator. E.g. `not product_name eq 'product_usage'`.
          Supported precedence operators:
          * `(` and `)` - Parentheses precedence operator. You can force some expressions to be evaluated first than another by enclosing them into parentheses E.g. `(name eq 'saas_licenses' and product_name eq 'Talkdesk Fax') or name eq 'guardian'` is different than `name eq 'saas_licenses'
            and (product_name eq 'Talkdesk Fax' or name eq 'guardian')`.
          Values must have single quotes marks e.g.: `name eq 'guardian'`

          Examples
          * `filter=product_name eq 'Saas Licenses' and (name eq 'saas_licenses' and contains(product_name, 'digital')` - Retrieve the wallets that have product_name 'Saas Licenses' and thatname is 'saas_licenses' or product_name contains the string 'digital' within.
          * `filter=name eq 'ai_premium_batch' or contains(product_name, 'realtime') - Retrieves the wallets that have name 'ai_premium_batch' or that product_name contains the string 'realtime' within.
        required: false
        style: form
        explode: true
        schema:
          maxLength: 2147483647
          minLength: 0
          type: string
        example: "product_name eq 'SaaS Consumption-Licensing' or name contains ('product_usage','telco_usage')"
      - name: order_by
        in: query
        description: |-
          Sorts by the indicated field in the specified direction, ascending or descending.</b>
                The expression format <b>may contain</b> the suffix <b>asc</b> or <b>desc</b> separated from the property name with a colon in between.<br/>
                <b>Examples:</b>
                <ul>
                <li>name:desc</li>
                </ul>      More information <a href='https://talkdesk.github.io/api-docs/#collection-resources-should-support-sorting'>here</a>
        required: false
        style: form
        explode: true
        schema:
          maxLength: 2147483647
          minLength: 0
          type: string
          default: name:asc
        example: name:asc
      responses:
