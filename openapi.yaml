          type: string
          description: The ID of the customer that created this order
          example: customer123
        order_id:
          type: string
          description: The ID of the order associated with the shipment
          example: order789
        delivery_quantity:
          type: integer
          description: The quantity of items being delivered in this shipment
          example: 3
        delivery_date_start:
          type: string
          description: The start date of the delivery window
          format: date-time
          example: 2025-02-21T12:16:50.078Z
        delivery_date_end:
          type: string
          description: The end date of the delivery window
          format: date-time
          example: 2025-02-28T12:16:50.078Z
        delivery_staff:
          type: string
          description: The name of the staff member responsible for the delivery.
          example: Mike Daniel
        latest_status_info:
          type: string
          description: The latest status of the shipment
          example: Shipped
        last_update:
          type: string
          description: "The timestamp of the latest update for the shipment. Only\
            \ the ISO 8601 date-time format (e.g., '2025-02-17T12:00:00Z') is supported."
          format: date-time
          example: 2025-02-17T12:00:00Z
        created_time:
          type: string
          description: "The timestamp when the shipment was created. Only the ISO\
            \ 8601 date-time format (e.g., '2025-02-17T12:00:00Z') is supported."
          format: date-time
          example: 2025-01-23T12:16:50.078Z
        description:
          type: string
          description: A description of the shipment
          example: This shipment will be delivered by FedEx.
        shipping_provider:
          type: string
          description: The shipping provider for the shipment
          example: FedEx
        shipping_date:
          type: string
          description: The date when the shipment was processed
          format: date-time
          example: 2025-01-23T12:16:50.078Z
        shipping_address:
          $ref: "#/components/schemas/inline_response_200_214__embedded_shipping_address"
        tracking_info:
          $ref: "#/components/schemas/inline_response_200_214__embedded_tracking_info"
        items:
          type: array
          description: The list of items included in this shipment
          items:
            allOf:
            - type: object
              properties:
                id:
                  type: string
                  description: The ID of the order item
                  example: orderItem789
                product_id:
                  type: string
                  description: The product ID of the item
                  example: product_iphone_15
                name:
                  type: string
                  description: The name of the order item
                  example: Apple iPhone 15
                description:
                  type: string
                  description: A brief description of the order item
                  example: Latest Apple smartphone
                brand:
                  type: string
                  description: The brand of the order item
                  example: Brand A
                price:
                  type: object
                  properties:
                    value:
                      type: string
                      description: The price value of the order item
                      example: "999.99"
                    currency:
                      type: string
                      description: The currency of the price
                      example: USD
                  description: The price of the order item
                image_url:
                  type: string
                  description: The URL of the order item's image
                  format: uri
                  example: https://example.com/product1.jpg
                quantity:
                  type: integer
                  description: The quantity of the order item
                  example: 2
                sku:
                  type: string
                  description: The SKU of the order item
                  example: ABC123
              description: Represents an item that was ordered
        custom_fields:
          type: object
          additionalProperties: true
          description: Additional custom fields
      description: Represents a shipment associated with a customer
      example:
        created_time: 2025-01-23T12:16:50.078Z
        shipping_provider: FedEx
        shipping_date: 2025-01-23T12:16:50.078Z
        custom_fields: ""
        description: This shipment will be delivered by FedEx.
        delivery_date_end: 2025-02-28T12:16:50.078Z
        tracking_info:
          tracking_carrier: FedEx
          external_url: https://tracking.carrier.com/1Z9999999999999999
          tracking_number: FedEx1Z99999999
        delivery_quantity: 3
        delivery_date_start: 2025-02-21T12:16:50.078Z
        last_update: 2025-02-17T12:00:00Z
        latest_status_info: Shipped
        delivery_staff: Mike Daniel
        id: shipment123
        shipping_address:
          country_code: US
          address: 123 Main St
          city: New York
          last_name: Doe
          phone_number: "+123456789"
          id: address_id_123
          first_name: John
          zip_code: "10001"
          region_code: NY
        customer_id: customer123
        brand: Brand A
        order_id: order789
        items:
        - ""
        - ""
