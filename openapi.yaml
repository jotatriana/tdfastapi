      x-swagger-router-controller: FSIDesktopApp
    post:
      tags:
      - FSI Desktop App
      summary: Creates a session
      description: |
        It creates a session for a given the session_key in the format <AGENT_NONCE>::<ACCOUNT_ID>::<AGENT_ID>, where:
          - <AGENT_NONCE>: uid
          - <ACCOUNT_ID>: account ID
          - <AGENT_ID>: agent ID
        The endpoint validates that both account ID and agent ID provided in sesseion_key match with account ID and agent ID extracted from JWT (aid and uid, respectively):
          - if yes, a RSA public-private key pair is generated and the nonce is saved encrypted with the public key, and returned the private_key, for later decode the nonce.
          - otherwise a Bad Request is thrown.
      operationId: fsi_desktop_appSessionPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/fsidesktopapp_session_body"
            example:
              session_key: abcdefgh::5fce39cfe2f4600001d3f625::60ae0cb2dde6f620e0dc4af3
        required: true
      responses:
        "200":
          description: The object with the encrypted RSA private key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_165"
              example:
                private_key: MIIBVQIBADANBgkqhkiG9w0BAQEFAASCAT8wggE7AgEAAkEA1yhxGeHSlVlpMYMH0XLcjshnONeLjrpiEWHZza+QvAw2G
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "2120400"
                message: Bad request.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "2120401"
                message: Invalid JWT.
        "403":
