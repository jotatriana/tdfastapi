            type: string
            description: "The relationship of the patient to the insured individual\
              \ (e.g., Self, Spouse, Child)."
            example: Self
          network_type:
            type: string
            description: "Applicable for public and private plans - tells how the\
              \ plan works, the rules about which doctors and hospitals one can use.\
              \ e.g. HMO, PPO."
            example: HMO
