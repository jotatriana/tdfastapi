    inline_response_200_218:
      required:
      - id
      - order_number
      type: object
      properties:
        id:
          type: string
          description: The ID of the order
          example: order456
        customer_id:
          type: string
          description: The ID of the customer that created this order
          example: customer123
        status_info:
          type: array
          description: The list of possible status information states/steps for the
            order
          items:
            $ref: "#/components/schemas/inline_response_200_218_status_info"
        status_info_current_index:
          type: integer
          description: The current state/step index of the order status in the 'status_info'
            list
          example: 3
        order_number:
          type: string
          description: The number of the order (usually the order identifier that
            the customer knows)
          example: "#Y34DHR"
        purchase_datetime:
          type: string
          description: The timestamp date when the order was created
          format: date-time
          example: 2021-09-14T12:16:50.078Z
        tracking_info:
          allOf:
          - required:
            - tracking_number
            type: object
            properties:
              tracking_number:
                type: string
                description: The tracking number associated with the order delivery
                example: "#USPS 123456789"
              external_url:
                type: string
                description: "The URL of the external system where we can get more\
                  \ tracking details (ex: the URL of the carrier)"
                format: uri
                example: https://external.url.com/
            description: The tracking information associated with the order delivery
        delivery_type:
          description: The type of delivery associated with the order
          allOf:
          - type: string
            description: Represents the type of delivery for a given order
            example: SHIPPING
            enum:
            - UNKNOWN
            - LOCAL_DELIVERY
            - LOCAL_PICKUP
            - SHIPPING
        shipping_addresses:
          type: array
          description: The addresses to which the order will be/was shipped
          items:
            $ref: "#/components/schemas/inline_response_200_218_shipping_addresses"
        highlighted_item:
          description: The highlighted/main item of the order
          allOf:
          - required:
            - id
            - name
            - price
            type: object
            properties:
              id:
                type: string
                description: The ID of the item
                example: orderItem789
              name:
                type: string
                description: The name of the item
                example: Order Item 789
              description:
                type: string
                description: The description of the item
                example: Description of order Item 789
              brand:
                type: string
                description: The brande of the item
                example: Brand 123
              price:
                description: The price of the item
                allOf:
                - required:
                  - currency
                  - value
                  type: object
                  properties:
                    value:
                      type: number
                      description: The amount of money
                      format: double
                      example: 10.5
                    currency:
                      type: string
                      description: The currency of the money amount
                      example: EUR
                  description: Represents an amount of money in a given currency
              image_url:
                type: string
                description: The URL of the item image/picture
                format: uri
                example: https://external-integration.url.com/order_item_icon.png
              quantity:
                maximum: 100
                minimum: 1
                type: integer
                description: The quantity of the item
                format: int64
                example: 10
              sku:
                type: string
                description: The sku of the item
                example: Sku 123
              deliverable_quantity:
                maximum: 100
                minimum: 1
                type: integer
                description: The quantity of order items that are yet to be delivered/processed
                format: int64
                example: 10
              deliveries:
                type: array
                description: List of deliveries where the item is inserted
                items:
                  allOf:
                  - required:
                    - id
                    type: object
                    properties:
                      id:
                        type: string
                        description: The ID of the order delivery
                        example: orderDelivery123
                      delivery_quantity:
                        maximum: 100
                        minimum: 1
                        type: integer
                        description: The quantity of items associated with the delivery
                        format: int64
                        example: 10
                      carrier:
                        type: string
                        description: "[Only supported on Customers Bridge] This refers\
                          \ to the shipping carrier or courier service that is handling\
                          \ the delivery of the item."
                        example: FedEx
                      delivery_type:
                        type: string
                        description: "[Only supported on Customers Bridge] The method\
                          \ of delivery used for the shipment."
                        example: Store delivery
                      delivery_date_start:
                        type: string
                        description: "[Only supported on Customers Bridge] The start\
                          \ date of the delivery window, indicating when the shipment\
                          \ is expected to begin its delivery process. This is when\
                          \ the carrier will start the delivery journey or the delivery\
                          \ window opens."
                        format: date-time
                        example: 2025-02-21T12:16:50.078Z
                      delivery_date_end:
                        type: string
                        description: "[Only supported on Customers Bridge] The end\
                          \ date of the delivery window, indicating when the shipment\
                          \ is expected to be delivered or when the delivery window\
                          \ closes. This shows the expected timeframe for the delivery\
                          \ to be completed."
                        format: date-time
                        example: 2025-02-28T12:16:50.078Z
                      shipping_date:
                        type: string
                        description: "[Only supported on Customers Bridge] The date\
                          \ when the shipment was actually shipped out. This is when\
                          \ the order was dispatched from the warehouse or fulfillment\
                          \ center."
                        example: 2025-02-21T12:16:50.078Z
                      service_level:
                        type: string
                        description: "[Only supported on Customers Bridge] Indicates\
                          \ the level of service for the delivery, which represents\
                          \ the default or basic shipping option."
                        example: Standard
                      description:
                        type: string
                        description: "[Only supported on Customers Bridge] A text\
                          \ description providing more context or details about the\
                          \ shipment."
                        example: This shipment will be delivered by FedEx.
                      latest_status_info:
                        description: The latest delivery status information
                        allOf:
                        - required:
                          - type
                          type: object
                          properties:
                            type:
                              type: string
                              description: The type of the state/step
                              example: "[\"UNKNOWN\",\"ATTEMPTED_DELIVERY\",\"READY_FOR_PICKUP\"\
                                ,\"PICKED_UP\",\"CONFIRMED\",\"IN_TRANSIT\",\"OUT_FOR_DELIVERY\"\
                                ,\"DELIVERED\",\"FAILURE\"]"
                            status_date_time:
                              type: string
                              description: The timestamp date when the status info
                                state/step was 'reached'
                              format: date-time
                              example: 2021-10-23T12:16:50.078Z
                          description: Represents a status info state/step for a given
                            order delivery
                      tracking_info:
                        description: The tracking information associated with the
                          order delivery
                        allOf:
                        - required:
                          - tracking_number
                          type: object
                          properties:
                            tracking_number:
                              type: string
                              description: The tracking number associated with the
                                order delivery
                              example: "#USPS 123456789"
                            external_url:
                              type: string
                              description: "The URL of the external system where we\
                                \ can get more tracking details (ex: the URL of the\
                                \ carrier)"
                              format: uri
                              example: https://external.url.com/
                          description: The tracking information associated with the
                            order delivery
                      last_update:
                        type: string
                        description: The timestamp date when the order delivery was
                          last updated
                        format: date-time
                        example: 2021-09-14T12:16:50.078Z
                    description: Represents a order item delivery resource
              custom_fields:
                type: object
                additionalProperties: true
                description: The custom fields associated with the provider
            description: Represents an item that was ordered
        custom_fields:
          type: object
          additionalProperties: true
          description: The custom fields associated with the provider
        brand:
          type: string
          description: The brand of the provider
          example: Brand 123
        _links:
          $ref: "#/components/schemas/inline_response_200_218__links"
      description: Represents the customer most recent order resource
      example:
        highlighted_item: ""
        _links:
          self:
            href: http://api-docs.talkdesk.org/erc/ecommerce/workspace/customers/customer123/most-recent-order
