          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "3234030"
                message: Required scopes are missing.
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
