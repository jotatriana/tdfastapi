    post:
      tags:
      - Queues API
      summary: Create queue
      description: Create queue
      operationId: CreateQueue
      requestBody:
        description: The queue to be created
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ccaas_queues_body"
            example:
              name: queue_name
              description: my queue has a description
        required: true
      responses:
        "201":
          description: Queue created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_201_23"
              example:
                id: queue_id
                name: queue_name
                description: my queue has a description
                created_at: 2023-04-05T09:45:00Z
                updated_at: 2023-04-05T09:45:00Z
                settings:
                  voice:
                    transfers:
                      agent_waiting_music:
                        type: PROMPT
                        value: prompt_id
                      maximum_waiting_time: 1
                      offer_time: 35
        "400":
          description: Malformed request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0490002"
                message: Malformed request
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0490000"
                message: Unauthorized.
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0490003"
                message: Forbidden.
        "409":
          description: Conflict on create queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              examples:
                Queue with given name already exists:
                  value:
                    code: "0490005"
                    message: This queue name is already taken
                Queue's account limit exceeded:
                  value:
                    code: "0490022"
                    message: The number of queues exceeds the limit number of queues
                      an account can have
        "422":
          description: Unprocessable Entity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              examples:
                Invalid Fields Length:
                  value:
                    code: "0490007"
                    message: Invalid queue
                    fields:
                    - name: name
                      description: size must be between 1 and 50
                    - name: description
                      description: size must be between 0 and 250
                Name Starting With Empty Space:
                  value:
                    code: "0490007"
                    message: Invalid queue
                    fields:
                    - name: name
                      description: cannot start with empty space
                Name Ending With Empty Space:
                  value:
                    code: "0490007"
                    message: Invalid queue
                    fields:
                    - name: name
                      description: cannot end with empty space
                Name Contains Upper Case Letters:
                  value:
                    code: "0490007"
                    message: Invalid queue
                    fields:
                    - name: name
                      description: cannot contain upper case letters
                Name Contains Invalid Characters:
                  value:
                    code: "0490007"
                    message: Invalid queue
                    fields:
                    - name: name
                      description: "can only contain alphabetic characters, punctuation,\
                        \ digits, currency symbols and whitespace characters"
        "500":
          description: An unexpected error has occurred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
              example:
                code: "0490001"
                message: An unexpected error has occurred. Contact Talkdesk Support.
      security:
      - Early Access:
        - queues:write
      x-swagger-router-controller: QueuesAPI
