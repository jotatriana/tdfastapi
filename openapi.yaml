        id:
          type: string
          description: Prescription identifier.
        medication:
          type: string
          description: The medication name associated with the prescription.
        status:
          type: string
          description: The status of the prescription.
          enum:
          - UNDEFINED
          - ACTIVE
          - DISCONTINUED
          - ENDED
          - EXPIRED
        pharmacy_id:
          type: string
          description: The pharmacy id of the prescription.
        pharmacy_ncpdp_id:
          type: string
          description: The NCPDP ID of the pickup pharmacy.
        pharmacy_name:
          type: string
          description: The pharmacy name of the prescription.
        pharmacy_address:
          type: string
          description: The pharmacy address of the prescription.
        last_dispensed:
          type: string
          description: The last dispensed of the prescription.
          format: date-time
        end_date:
          type: string
          description: The end date of the prescription.
          format: date-time
        fills_remaining:
          type: integer
          description: Number of (whole) fills remaining on the prescription.
        is_fillable:
          type: boolean
          description: Indicates whether the prescription is currently able to be
            filled.
        has_fill_in_progress:
          type: boolean
          description: Indicates whether there is a fill in progress for this prescription.
        is_rar_able:
          type: boolean
          description: Indicates whether a Refill Authorization Request can be generated
            for the prescription.
        rar_status:
          type: string
          description: The status of the latest refill authorization request. This
            will be populated when the latest non-cancelled action on a prescription
            is a refill authorization request.
          enum:
          - PENDING
          - APPROVED
          - DENIED
