    get:
      tags:
      - Conversations
      summary: Query interactions and their messages based from the provided interaction
        start date.
      description: "Retrieves all interactions that started within a specified time\
        \ range (up to a 7-day interval), filtered by the account ID contained in\
        \ the JWT token. The result includes the interaction metadata and associated\
        \ messages. Results are paginated using a cursor-based mechanism. The interaction_ended\
        \ parameter refers to the end of the interaction start time range, not when\
        \ the interaction itself ended. This endpoint only returns interactions that\
        \ started between the interaction_started and interaction_ended timestamps."
      operationId: GetInteractions
      parameters:
      - name: interaction_started
        in: query
        description: The start of the time range. Only interactions that started after
          or at this timestamp will be included.
        required: false
        style: form
        explode: true
        schema:
          minLength: 20
          type: string
          format: date-time
          example: 2023-06-16T00:00:02Z
      - name: interaction_ended
        in: query
        description: The end of the time range. This refers to the end of the start
          time range — not when the interaction ended. Only interactions that started
          before or at this timestamp will be included.
        required: false
        style: form
        explode: true
        schema:
          minLength: 20
          type: string
          format: date-time
          example: 2023-06-16T00:00:02Z
      - name: cursor
        in: query
        description: The cursor to use for pagination.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved the interactions.
          content:
