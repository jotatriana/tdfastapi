        latitude:
          maximum: 90
          minimum: -90
          type: number
          description: |
            <ul>
              <li>Latitude and longitude are used together with distance. The search parameters include latitude and longitude to retrieve a list of all locations within a certain radius.</li>
              <li>Currently, these three parameters can only be used when the Feature Flag is enabled.</li>
            </ul>
          format: double
          example: 38.698943
