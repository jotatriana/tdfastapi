          items:
            allOf:
            - required:
              - amount
              - currency
              - line_item_id
              - quantity
              type: object
              properties:
                line_item_id:
                  type: string
                  description: The ID of the refunded line item
                  example: item456
                quantity:
                  type: integer
                  description: The quantity refunded
                  example: 2
                amount:
                  type: number
                  description: The refund amount for this line item
                  format: double
                  example: 20
                currency:
                  type: string
                  description: The currency of the refund
                  example: USD
              description: Represents a refunded line item in the order
        transactions:
          type: array
          description: List of refund transactions
          items:
            allOf:
            - required:
              - amount
              - currency
              - id
              - kind
              type: object
              properties:
                id:
                  type: string
                  description: The ID of the refund transaction
                  example: txn789
                created_at:
                  type: string
                  description: The creation time of the transaction
                  format: date-time
                  example: 2024-06-01T12:00:00Z
                amount:
                  type: number
                  description: The amount refunded in this transaction
                  format: double
                  example: 20
                currency:
                  type: string
                  description: The currency of the transaction
                  example: USD
                gateway:
                  type: string
                  description: The payment gateway used
                  example: Stripe
                kind:
                  type: string
                  description: The kind of transaction
                  example: refund
                payment_detail:
                  type: object
                  properties:
                    card_brand:
                      type: string
                      description: The payment card brand of the order
                      example: Visa
                    card_brand_image_url:
                      type: string
                      description: The icon of payment card brand
                      example: https://external-integration.url.com/payment_card_brand_icon.svg
                    card_number:
                      type: string
                      description: The number of payment card
                      example: '**** **** **** *567'
                    is_refunded:
                      type: boolean
                      description: The flag to indicate if order is refunded
                      example: false
              description: Represents a transaction for the refund
