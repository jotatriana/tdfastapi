          Allows filtering by using comparison and logical operators, similar to OData/SCIM filters.<br> Regarding operators, we only support eq (exact match filter) + or for logical operators.<br><br>
          <b>Supported fields:</b> <ul> <li>status</li> </ul>
          <b>Examples:</b> <ul> <li>status eq 'QUEUED' or status eq 'PROCESSING'</li> <li>status eq 'UPLOADING'</li> </ul>
        required: false
        style: form
        explode: true
        schema:
          type: string
